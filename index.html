<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
  <title>ASHBORNE — Main Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Share Tech Mono', monospace;
    }

    #menu {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    /* Background */
    #bg {
      position: absolute;
      inset: 0;
      background: url('background.png') center center / cover no-repeat;
      filter: brightness(0.55) contrast(1.15) saturate(0.8);
      transform: scale(1.05);
    }

    /* Dark vignette overlay */
    #vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.7) 100%),
        linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 40%),
        linear-gradient(to right, rgba(0,0,0,0.5) 0%, transparent 50%);
      pointer-events: none;
    }

    /* Scanline overlay */
    #scanlines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 5;
    }

    /* Particles canvas */
    #particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
    }

    /* Content */
    .content {
      position: relative;
      z-index: 10;
      padding-left: 8vw;
    }

    /* Game title */
    .title-wrapper {
      margin-bottom: 1.5vh;
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 8vw, 8rem);
      color: #e8dcc8;
      letter-spacing: 0.15em;
      line-height: 0.95;
      text-shadow:
        0 0 40px rgba(255, 120, 30, 0.3),
        0 0 80px rgba(255, 80, 10, 0.15),
        2px 2px 4px rgba(0,0,0,0.8);
    }

    .subtitle {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(0.65rem, 1.2vw, 1rem);
      color: rgba(200, 170, 110, 0.7);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      margin-top: 0.5vh;
    }

    /* Divider line */
    .divider {
      width: 0;
      height: 1px;
      background: linear-gradient(to right, rgba(255,140,50,0.8), rgba(255,140,50,0));
      margin: 3vh 0;
    }

    /* Menu items */
    .menu-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.6vh;
    }

    .menu-item {
      position: relative;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1vh 1.5vw;
      cursor: pointer;
      opacity: 0;
      transform: translateX(-40px);
      border-left: 2px solid rgba(255,140,50,0);
    }

    .menu-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 0;
      height: 100%;
      background: linear-gradient(to right, rgba(255,120,30,0.12), transparent);
      border-left: 2px solid rgba(255,140,50,0);
      transition: none;
    }

    .menu-item .marker {
      width: 6px;
      height: 6px;
      background: rgba(255, 140, 50, 0.6);
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      flex-shrink: 0;
      opacity: 0;
    }

    .menu-item .label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.3rem, 2.5vw, 2rem);
      color: rgba(200, 185, 160, 0.75);
      letter-spacing: 0.12em;
      transition: none;
    }

    .menu-item .hotkey {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(0.55rem, 0.8vw, 0.75rem);
      color: rgba(255, 140, 50, 0.3);
      letter-spacing: 0.2em;
      margin-left: auto;
      opacity: 0;
    }

    /* Version info */
    .version {
      position: absolute;
      bottom: 3vh;
      left: 8vw;
      z-index: 10;
      font-size: clamp(0.55rem, 0.7vw, 0.7rem);
      color: rgba(180, 160, 130, 0.3);
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    /* Bottom-right decoration */
    .corner-info {
      position: absolute;
      bottom: 3vh;
      right: 4vw;
      z-index: 10;
      text-align: right;
      font-size: clamp(0.5rem, 0.65vw, 0.65rem);
      color: rgba(180, 160, 130, 0.25);
      letter-spacing: 0.2em;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div id="menu">
    <div id="bg"></div>
    <div id="vignette"></div>
    <div id="scanlines"></div>
    <canvas id="particles"></canvas>

    <div class="content">
      <div class="title-wrapper">
        <div class="title">ASHBORNE</div>
        <div class="subtitle">no dawn without ashes</div>
      </div>

      <div class="divider"></div>

      <ul class="menu-list">
        <li class="menu-item" data-action="continue">
          <span class="marker"></span>
          <span class="label">Resume Expedition</span>
          <span class="hotkey">[C]</span>
        </li>
        <li class="menu-item" data-action="new-game">
          <span class="marker"></span>
          <span class="label">Enter the Wasteland</span>
          <span class="hotkey">[N]</span>
        </li>
        <li class="menu-item" data-action="load">
          <span class="marker"></span>
          <span class="label">Recover Data</span>
          <span class="hotkey">[L]</span>
        </li>
        <li class="menu-item" data-action="settings">
          <span class="marker"></span>
          <span class="label">Recalibrate</span>
          <span class="hotkey">[S]</span>
        </li>
        <li class="menu-item" data-action="credits">
          <span class="marker"></span>
          <span class="label">Survivors Log</span>
          <span class="hotkey">[R]</span>
        </li>
        <li class="menu-item" data-action="quit">
          <span class="marker"></span>
          <span class="label">Abandon Camp</span>
          <span class="hotkey">[Q]</span>
        </li>
      </ul>
    </div>

    <div class="version">v0.4.7 — early access</div>
    <div class="corner-info">
      DAY 1,247<br>
      SECTOR 09-NW<br>
      THREAT: MODERATE
    </div>
  </div>

  <script>
    /* ========== FIRE PARTICLES (GSAP) ========== */
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const particles = [];
    const PARTICLE_COUNT = 90;

    const COLORS = [
      [255, 180, 60],
      [255, 120, 30],
      [255, 80, 10],
      [255, 200, 80],
      [220, 60, 10],
    ];

    function createParticle() {
      const color = COLORS[Math.floor(Math.random() * COLORS.length)];
      const p = {
        x: Math.random() * W * 0.6,
        y: H + 10,
        size: Math.random() * 1.5 + 0.5,
        alpha: 0,
        color,
        drift: (Math.random() - 0.5) * 0.6,
        wobbleAmp: Math.random() * 30 + 10,
        wobbleSpeed: Math.random() * 2 + 1,
        wobbleOffset: Math.random() * Math.PI * 2,
        progress: 0,
      };

      const duration = (Math.random() * 5 + 4) * 2.5;

      gsap.to(p, {
        y: -20,
        alpha: 1,
        duration: duration * 0.2,
        ease: 'power1.out',
        onComplete() {
          gsap.to(p, {
            alpha: 0,
            duration: duration * 0.8,
            ease: 'power1.in',
          });
        },
      });

      gsap.to(p, {
        progress: 1,
        duration,
        ease: 'none',
        onComplete() {
          const idx = particles.indexOf(p);
          if (idx > -1) particles.splice(idx, 1);
          particles.push(createParticle());
        },
      });

      return p;
    }

    // Spawn particles evenly over time using a steady interval
    let spawned = 0;
    const spawnInterval = 0.3; // seconds between each particle
    function spawnNext() {
      if (spawned < PARTICLE_COUNT) {
        particles.push(createParticle());
        spawned++;
        gsap.delayedCall(spawnInterval, spawnNext);
      }
    }
    spawnNext();

    function drawParticles() {
      ctx.clearRect(0, 0, W, H);

      for (const p of particles) {
        const wobble = Math.sin(p.progress * p.wobbleSpeed * Math.PI * 2 + p.wobbleOffset) * p.wobbleAmp;
        const drawX = p.x + wobble + p.drift * p.progress * 100;
        const drawY = p.y;

        // Glow
        ctx.beginPath();
        ctx.arc(drawX, drawY, p.size * 3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${p.color[0]}, ${p.color[1]}, ${p.color[2]}, ${p.alpha * 0.15})`;
        ctx.fill();

        // Core
        ctx.beginPath();
        ctx.arc(drawX, drawY, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${p.color[0]}, ${p.color[1]}, ${p.color[2]}, ${p.alpha * 0.8})`;
        ctx.fill();

        // Bright center
        ctx.beginPath();
        ctx.arc(drawX, drawY, p.size * 0.4, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 240, 200, ${p.alpha * 0.9})`;
        ctx.fill();
      }
    }

    gsap.ticker.add(drawParticles);

    /* ========== INTRO ANIMATION ========== */
    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    // Background zoom-in
    tl.from('#bg', { scale: 1.15, duration: 3, ease: 'power2.out' }, 0);
    tl.from('#vignette', { opacity: 0, duration: 2 }, 0);

    // Title
    tl.from('.title', {
      y: 30,
      opacity: 0,
      duration: 1.4,
      ease: 'power2.out',
    }, 0.5);

    tl.from('.subtitle', {
      opacity: 0,
      x: -20,
      duration: 1,
    }, 1.2);

    // Divider line wipe
    tl.to('.divider', {
      width: 'clamp(150px, 20vw, 300px)',
      duration: 0.8,
      ease: 'power2.inOut',
    }, 1.5);

    // Menu items stagger
    tl.to('.menu-item', {
      opacity: 1,
      x: 0,
      duration: 0.6,
      stagger: 0.1,
      ease: 'power2.out',
      onComplete() {
        gsap.set('.menu-item', { opacity: 1, x: 0 });
      },
    }, 1.8);

    // Version & corner info
    tl.from('.version', { opacity: 0, duration: 1 }, 2.5);
    tl.from('.corner-info', { opacity: 0, y: 10, duration: 1 }, 2.5);

    /* ========== MENU HOVER (GSAP) ========== */
    const menuItems = document.querySelectorAll('.menu-item');

    menuItems.forEach(item => {
      const label = item.querySelector('.label');
      const marker = item.querySelector('.marker');
      const hotkey = item.querySelector('.hotkey');
      const bg = item;

      item.addEventListener('mouseenter', () => {
        gsap.killTweensOf([label, marker, hotkey, bg]);
        gsap.to(label, {
          color: 'rgba(255, 200, 140, 1)',
          textShadow: '0 0 20px rgba(255,140,50,0.3)',
          x: 6,
          duration: 0.3,
          ease: 'power2.out',
        });
        gsap.to(marker, {
          opacity: 1,
          scale: 1.3,
          duration: 0.3,
          ease: 'back.out(2)',
        });
        gsap.to(hotkey, { opacity: 1, duration: 0.3 });
        gsap.to(bg, {
          borderLeftColor: 'rgba(255,140,50,0.6)',
          background: 'linear-gradient(to right, rgba(255,120,30,0.1), transparent)',
          duration: 0.3,
        });
      });

      item.addEventListener('mouseleave', () => {
        gsap.killTweensOf([label, marker, hotkey, bg]);
        gsap.to(label, {
          color: 'rgba(200, 185, 160, 0.75)',
          textShadow: '0 0 0px rgba(255,140,50,0)',
          x: 0,
          duration: 0.3,
          ease: 'power2.out',
        });
        gsap.to(marker, {
          opacity: 0,
          scale: 1,
          duration: 0.2,
        });
        gsap.to(hotkey, { opacity: 0, duration: 0.2 });
        gsap.to(bg, {
          borderLeftColor: 'rgba(255,140,50,0)',
          background: 'linear-gradient(to right, rgba(255,120,30,0), transparent)',
          duration: 0.3,
        });
      });

      // Click flash
      item.addEventListener('click', () => {
        gsap.fromTo(item, {
          backgroundColor: 'rgba(255,140,50,0.2)',
        }, {
          backgroundColor: 'rgba(255,140,50,0)',
          duration: 0.5,
          ease: 'power2.out',
        });
      });
    });

    /* ========== SLOW BG PAN ========== */
    gsap.to('#bg', {
      x: -15,
      y: -8,
      duration: 20,
      ease: 'sine.inOut',
      yoyo: true,
      repeat: -1,
    });
  </script>
</body>
</html>
